<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AI Cloud Study Saver</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #172033 0%, #2563eb 54%, #0f9f6e 100%);
        color: #fff;
      }

      main {
        width: min(88vw, 460px);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2.2rem;
        line-height: 1.05;
      }

      p {
        color: #dbeafe;
        font-size: 1rem;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        color: #172033;
        background: #fff;
        border-radius: 8px;
        padding: 0.8rem 1rem;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Cloud Study Saver</h1>
      <p>Loading your study workspace. If the app does not open automatically, use the button below.</p>
      <a href="https://ai-cloud-study-saver.onrender.com">Open App</a>
    </main>
  </body>
</html>
